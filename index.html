<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦆</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: #000;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    #pato-gif {
      display: none; 
      image-rendering: pixelated;
      width: 256px;
      height: 256px;
    }

    #overlay {
      text-align: center;
      color: #c5c5c5;
      z-index: 10;
    }

    #overlay:hover { color: #ffffff; }

    .btn-perigo {
      background: none;
      border: 1px solid currentColor;
      color: inherit;
      padding: 10px 20px;
      margin-top: 20px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      outline: none;
    }

    .btn-perigo:hover {
      color: #fff;
      background: #333;
    }

    body.revealed { background-color: #ADD9F1; }
  </style>
</head>
<body>
  <div id="overlay">
    <p>Você tem certeza que quer saber o que tem aqui?</p>
    <button class="btn-perigo" onclick="liberarOPato()">Sim, eu aceito o risco</button>
  </div>
  <!-- curioso. o pato também era, antes de saber demais. — HomiGalado -->
  <img id="pato-gif" src="./assets/pato.gif" alt="pato">
<audio id="duck-song" preload="auto">
  <source src="./assets/duck.mp3" type="audio/mpeg">
</audio>

<script>
function liberarOPato() {
  const overlay = document.getElementById('overlay');
  const pato = document.getElementById('pato-gif');
  const audio = document.getElementById('duck-song');

  document.body.classList.add('revealed');
  overlay.style.display = 'none';
  pato.style.display = 'block';

  audio.currentTime = 0;
  audio.play().catch(err => console.log('play() bloqueado:', err));
}
</script>
